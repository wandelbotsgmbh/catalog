app:
    name: webrtc-viewer
    appIcon: app_icon.png
    containerImage:
        image: wandelbots.azurecr.io/apps/webrtc-viewer:0.0.1
        secrets:
            - name: pull-secret-wandelbots-azurecr-io
    port: 8000
