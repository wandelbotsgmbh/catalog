# yaml-language-server: $schema=https://wandelbotsgmbh.github.io/catalog/schema.json
---
version: 0.1.0
name: omniverse-camera
novaOsVersion: ">= 25.3"
supportsCloud: true
description: |
    Omniverse Camera is a Nova app that manages Omniverse Isaac Sim camera streams,
    allowing you to view and configure virtual camera feeds from your simulation environment.
    NOTE: This preview app is experimental and only available Wandelbots internal.
homepage: https://wandelbots.com
app:
    name: omniverse-camera
    appIcon: app_icon.png
    environment:
        - name: BASE_PATH
          value: /cell/omniverse-camera
    containerImage:
        image: wandelbots.azurecr.io/eai/omniverse-camera:0.1.0
        secrets:
            - name: pull-secret-wandelbots-azurecr-io
    port: 80
